<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Bernaptism</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #f0f0f0;
        }

        .main-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('Bernard 333 color 18x24.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* The central baby image/focus point */
        .baby-container {
            position: relative;
            z-index: 10;
            width: 60vh;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .baby-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 8px solid white;
        }

        /* Dancing Names */
        .name {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }

        /* Different colors for names */
        .n1 { color: #FF9AA2; }
        .n2 { color: #FFB7B2; }
        .n3 { color: #FFDAC1; }
        .n4 { color: #E2F0CB; }
        .n5 { color: #B5EAD7; }
        .n6 { color: #C7CEEA; }

        @keyframes dance {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -15px) rotate(5deg); }
            50% { transform: translate(-10px, 10px) rotate(-5deg); }
            75% { transform: translate(10px, 15px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .name-wrapper {
            position: absolute;
            animation: float around 20s infinite linear;
        }

        @keyframes float-around {
            from { transform: rotate(0deg) translateX(35vh) rotate(0deg); }
            to { transform: rotate(360deg) translateX(35vh) rotate(-360deg); }
        }

        /* Manual positioning and custom dance offsets */
        .w1 { top: 20%; left: 20%; animation: dance 4s infinite ease-in-out; }
        .w2 { top: 15%; right: 25%; animation: dance 5s infinite ease-in-out -1s; }
        .w3 { bottom: 25%; left: 15%; animation: dance 4.5s infinite ease-in-out -2s; }
        .w4 { bottom: 20%; right: 20%; animation: dance 3.5s infinite ease-in-out -0.5s; }
        .w5 { top: 50%; left: 5%; animation: dance 6s infinite ease-in-out -3s; }
        .w6 { top: 45%; right: 5%; animation: dance 5.5s infinite ease-in-out -1.5s; }

        @media (max-width: 600px) {
            .name { font-size: 1.2rem; }
            .baby-container { width: 80vw; height: 80vw; }
            .w1 { top: 10%; }
            .w2 { top: 5%; }
            .w6 { right: 2%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="baby-container">
            <img src="Gemini_Generated_Image_lthlazlthlazlthl.png" class="baby-img" alt="Bernard">
        </div>

        <div class="name w1 n1">Bernard</div>
        <div class="name w2 n2">Bernardo</div>
        <div class="name w3 n3">Bernat</div>
        <div class="name w4 n4">Bernardín</div>
        <div class="name w5 n5">Bernardí</div>
        <div class="name w6 n6">Bernie</div>
    </div>

</body>
</html>
