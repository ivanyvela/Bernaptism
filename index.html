<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Bernaptism</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #f0f0f0;
        }

        .main-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('Bernard 333 color 18x24.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Dancing Names */
        .name {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }

        /* Different colors for names */
        .n1 { color: #FF9AA2; }
        .n2 { color: #FFB7B2; }
        .n3 { color: #FFDAC1; }
        .n4 { color: #E2F0CB; }
        .n5 { color: #B5EAD7; }
        .n6 { color: #C7CEEA; }

        @keyframes dance {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(8deg); }
            50% { transform: translate(-15px, 15px) rotate(-8deg); }
            75% { transform: translate(15px, 20px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Positioning the names around the center */
        .w1 { top: 25%; left: 20%; animation: dance 4s infinite ease-in-out; }
        .w2 { top: 20%; right: 25%; animation: dance 5s infinite ease-in-out -1s; }
        .w3 { bottom: 30%; left: 15%; animation: dance 4.5s infinite ease-in-out -2s; }
        .w4 { bottom: 25%; right: 20%; animation: dance 3.5s infinite ease-in-out -0.5s; }
        .w5 { top: 55%; left: 10%; animation: dance 6s infinite ease-in-out -3s; }
        .w6 { top: 50%; right: 10%; animation: dance 5.5s infinite ease-in-out -1.5s; }

        @media (max-width: 600px) {
            .name { font-size: 1.5rem; }
            .w1 { top: 15%; }
            .w2 { top: 10%; }
            .w3 { bottom: 20%; }
            .w4 { bottom: 15%; }
            .w5 { left: 5%; }
            .w6 { right: 5%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Names dancing freely across the background -->
        <div class="name w1 n1">Bernard</div>
        <div class="name w2 n2">Bernardo</div>
        <div class="name w3 n3">Bernat</div>
        <div class="name w4 n4">Bernardín</div>
        <div class="name w5 n5">Bernardí</div>
        <div class="name w6 n6">Bernie</div>
    </div>

</body>
</html>
